{{ define "main" }}
<section class="page-content">
    <div class="container">
        <header class="page-header">
            <h1 class="page-title">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="page-description">{{ . }}</p>
            {{ end }}
        </header>
        
        <div class="content">
            {{ .Content }}
        </div>
        
        {{ if .Pages }}
        <div class="pages-list">
            {{ range .Pages }}
            <div class="page-item">
                <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
                {{ with .Description }}
                <p>{{ . }}</p>
                {{ end }}
            </div>
            {{ end }}
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
