<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
    {{ partial "head.html" . }}
</head>
<body class="{{ if .IsHome }}home{{ else }}page{{ end }} {{ with .Section }}section-{{ . }}{{ end }}">
    {{ partial "header.html" . }}
    
    <main id="main">
        {{ block "main" . }}{{ end }}
    </main>
    
    {{ partial "footer.html" . }}
    
    <script src="/js/main.js"></script>
    {{ if eq .Section "gallery" }}
    <script src="/js/gallery.js"></script>
    {{ end }}
</body>
</html>
