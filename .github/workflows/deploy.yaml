# Name of the GitHub Action workflow
name: Deploy Vite Site to AWS S3 & Invalidate CloudFront

# Controls when the action will run. 
# Triggers the workflow on push events but only for the "main" branch.
on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # The "deploy" job
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Check out the repository under $GITHUB_WORKSPACE, so your job can access it
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment. Vite is a Node.js-based tool.
      - name: ✨ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify a long-term support (LTS) version of Node.js
          cache: 'npm'      # Enable caching for npm dependencies to speed up future builds

      # Step 3: Install project dependencies defined in package-lock.json
      - name: 📦 Install Dependencies
        run: npm ci

      # Step 4: Build the Vite project for production. 
      # This command runs `vite build` and creates the static files in the `dist/` directory.
      - name: 🏗 Build Vite Site
        run: npm run build

      # Step 5: Configure AWS credentials for authenticating with your AWS account
      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your bucket's region if different

      # Step 6: Deploy the built site to the S3 bucket.
      # It syncs the contents of the `dist/` folder (the output of `npm run build`).
      - name: 📤 Deploy to S3
        run: aws s3 sync dist/ s3://sewsonia.com --delete

      # Step 7: Invalidate the CloudFront cache.
      # This is crucial for ensuring users see the updated site immediately.
      # It tells CloudFront to fetch the new files from S3 instead of serving old, cached versions.
      - name: 🔄 Invalidate CloudFront Cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?@=='sewsonia.com']].Id" --output text)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
