<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0,10 H 40 M 0,20 H 40 M 0,30 H 40 M 10,0 V 40 M 20,0 V 40 M 30,0 V 40" 
        fill="none" stroke="#f2e2e2" stroke-width="0.5"/>
    </pattern>
    
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2e2e2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d8b4b4" stop-opacity="0.3"/>
    </linearGradient>
    
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>
  
  <!-- Background pattern -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#f2e2e2" filter="url(#blur)"/>
  <circle cx="700" cy="500" r="120" fill="#f2e2e2" filter="url(#blur)"/>
  
  <!-- Overlay gradient -->
  <rect width="100%" height="100%" fill="url(#overlay)"/>
  
  <!-- Subtle lace pattern -->
  <g opacity="0.05">
    <path d="M0,0 Q20,20 0,40 Q20,60 0,80 Q20,100 0,120 Q20,140 0,160 Q20,180 0,200 
             Q20,220 0,240 Q20,260 0,280 Q20,300 0,320 Q20,340 0,360 Q20,380 0,400 
             Q20,420 0,440 Q20,460 0,480 Q20,500 0,520 Q20,540 0,560 Q20,580 0,600" 
      stroke="#d8b4b4" stroke-width="1" fill="none"/>
      
    <path d="M40,0 Q60,20 40,40 Q60,60 40,80 Q60,100 40,120 Q60,140 40,160 Q60,180 40,200 
             Q60,220 40,240 Q60,260 40,280 Q60,300 40,320 Q60,340 40,360 Q60,380 40,400 
             Q60,420 40,440 Q60,460 40,480 Q60,500 40,520 Q60,540 40,560 Q60,580 40,600" 
      stroke="#d8b4b4" stroke-width="1" fill="none"/>
    
    <!-- Repeat pattern across width -->
    <path d="M80,0 Q100,20 80,40 Q100,60 80,80 Q100,100 80,120 Q100,140 80,160 Q100,180 80,200 
             Q100,220 80,240 Q100,260 80,280 Q100,300 80,320 Q100,340 80,360 Q100,380 80,400 
             Q100,420 80,440 Q100,460 80,480 Q100,500 80,520 Q100,540 80,560 Q100,580 80,600" 
      stroke="#d8b4b4" stroke-width="1" fill="none"/>
    
    <!-- Continue pattern... -->
  </g>
</svg>
