<form action="https://formspree.io/f/{{ $.Site.Params.formspreeId | default "YOUR_FORM_ID" }}" method="POST" class="contact-form">
    <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>
    </div>
    
    <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="_replyto" required>
    </div>
    
    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
    </div>
    
    <div class="form-group">
        <label for="service">Interested In *</label>
        <select id="service" name="service" required>
            <option value="">Please select...</option>
            <option value="Custom Bridal Gown">Custom Bridal Gown</option>
            <option value="Bridal Alterations">Bridal Alterations</option>
            <option value="Custom Formalwear">Custom Formalwear</option>
            <option value="Formalwear Alterations">Formalwear Alterations</option>
            <option value="Bridal Party Services">Bridal Party Services</option>
            <option value="Other">Other</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="event-date">Event Date (if applicable)</label>
        <input type="date" id="event-date" name="event-date">
    </div>
    
    <div class="form-group">
        <label for="message">Your Message *</label>
        <textarea id="message" name="message" rows="6" required></textarea>
    </div>
    
    <div class="form-group">
        <label for="referral">How did you hear about us?</label>
        <input type="text" id="referral" name="referral">
    </div>
    
    <!-- Honeypot field to prevent spam -->
    <input type="text" name="_gotcha" style="display:none">
    
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Send Message</button>
    </div>
</form>
