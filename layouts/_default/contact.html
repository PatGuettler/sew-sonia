<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css"> <style>
      /* Basic Form Styling (Add this to your CSS file preferably) */
      .contact-form .form-group { margin-bottom: 1rem; }
      .contact-form label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
      .contact-form input[type="text"],
      .contact-form input[type="email"],
      .contact-form textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box; /* Important */
      }
      .contact-form textarea { resize: vertical; }
      .contact-form button {
        background-color: #007bff; /* Example color */
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      .contact-form button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    {{ partial "header.html" . }}

    <main>
        <article class="post">
          <header class="post-header">
            <h1 class="post-title">{{ .Title }}</h1>
          </header>
          <div class="post-content">
            {{ .Content }} <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
              <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
              </div>
              <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="_replyto" required>
              </div>
               <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="_subject">
              </div>
              <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6" required></textarea>
              </div>
              <input type="text" name="_gotcha" style="display:none"> <button type="submit">Send Message</button>
            </form>
            </div> </article>
    </main>

    {{ partial "footer.html" . }}

    </body>
</html>
