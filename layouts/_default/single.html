{{ define "main" }}
<article class="page-content">
    <div class="container">
        <header class="page-header">
            <h1 class="page-title">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="page-description">{{ . }}</p>
            {{ end }}
        </header>
        
        <div class="content">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
